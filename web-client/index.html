<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity AI Givelopment Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-workspace">
        <!-- Slide-out Settings Drawer (overlays the entire app) -->
        <aside id="settingsDrawer" class="settings-drawer">
            <div class="drawer-header">
                <h3>API Ayarları</h3>
                <button id="closeSettingsBtn" class="drawer-close-btn">&times;</button>
            </div>
            <div class="settings-box">
                <div class="input-group">
                    <label for="endpointInput">Base URL (Endpoint)</label>
                    <input type="text" id="endpointInput" value="https://ytdlp.kodyazar.com/v1">
                </div>
                <div class="input-group">
                    <label for="apiKeyInput">API Key</label>
                    <input type="password" id="apiKeyInput" value="my-super-secret-password-123">
                </div>
                <div class="input-group">
                    <label for="modelSelect">Model</label>
                    <select id="modelSelect">
                        <option value="claude-sonnet-4.5">claude-sonnet-4.5</option>
                        <option value="minimax-m2.5">minimax-m2.5</option>
                    </select>
                </div>
            </div>
        </aside>

        <!-- Main Inspector Frame (occupies 100% of viewport) -->
        <section class="inspector-pane">
            <iframe id="inspectorIFrame" src="about:blank"></iframe>
        </section>
    </div>

    <!-- Hidden Template for our Chat Pane (injected into the iframe dynamically) -->
    <template id="chatPaneTemplate">
        <div id="customChatPane" class="custom-chat-pane">
            <header class="chat-header">
                <div class="chat-header-left" style="display: flex; align-items: center; gap: 8px;">
                    <h2>AI Assistant</h2>
                    <div class="status-indicator" style="display: inline-flex; align-items: center; gap: 4px; background: #f1f5f9; padding: 2px 8px; border-radius: 10px; border: 1px solid #e2e8f0;">
                        <div id="statusDot" class="status-dot" style="width: 6px; height: 6px; background-color: #dc2626; border-radius: 50%;"></div>
                        <span id="statusText" class="status-text" style="font-size: 9px; font-weight: 600; color: #475569;">Bağlanıyor...</span>
                    </div>
                </div>
                <div class="chat-header-center">
                    <div class="mode-toggle-container">
                        <button id="planModeBtn" class="mode-btn plan active">🔮 Plan Modu</button>
                        <button id="buildModeBtn" class="mode-btn build">🛠️ Build Modu</button>
                    </div>
                </div>
                <div class="chat-header-right">
                    <button id="clearChatBtn" class="chat-action-btn" title="Sohbeti Temizle">🗑️ Temizle</button>
                    <button id="toggleSettingsBtn" class="chat-action-btn" title="API Ayarları">⚙️ Ayarlar</button>
                </div>
            </header>

            <div id="chatFeed" class="chat-feed">
                <div class="message-row assistant">
                    <div class="bubble">
                        <p>Merhaba! Ben senin Unity AI geliştirme asistanınım. Yapay zeka ile Unity projenizi kontrol edebilir, oyun nesneleri oluşturabilir ve kod yazabilirim.</p>
                        <p>Şu anda **Plan Modu**'ndayım. Bana ne yapmak istediğinizi söyleyin, önce ayrıntılı bir plan hazırlayayım!</p>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <textarea id="chatInput" class="chat-input" placeholder="Unity'de ne yapmak istersin? (örn: Sahneye kırmızı bir küp ekle)" rows="1"></textarea>
                <button id="sendBtn" class="send-btn" aria-label="Gönder">🚀</button>
            </div>
        </div>
    </template>

    <!-- Core App Logic -->
    <script>
        // Init MCP Inspector IFrame URL from Electron
        window.initMCPUrl = function(url) {
            const iframe = document.getElementById('inspectorIFrame');
            if (iframe) {
                iframe.src = url;
            }
        };
        window.addEventListener('DOMContentLoaded', () => {
            if (window.mcpUrlCached) {
                window.initMCPUrl(window.mcpUrlCached);
            }
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
